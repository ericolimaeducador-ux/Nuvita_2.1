name: CI

on:
  push:
    branches: [main, integracao]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — Type-check, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Dependency audit (informativo)
        run: npm audit --audit-level=high || true

      - name: Lint
        working-directory: apps/api
        run: npx eslint "src/**/*.ts" --max-warnings 0

      - name: Type check
        working-directory: apps/api
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/api
        run: npx nest build

      - name: Tests
        working-directory: apps/api
        run: npx jest --passWithNoTests

  web:
    name: Web — Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Tests
        working-directory: apps/web
        run: npm run test

      - name: Type check & build
        working-directory: apps/web
        run: npm run build
