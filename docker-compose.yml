services:
  mongodb:
    image: mongo:7
    container_name: nuvita2-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - nuvita2_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: nuvita2
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nuvita2-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - nuvita2_redis_data:/data
    command: redis-server --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nuvita2-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/nuvita2
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:8081
    ports:
      - "3001:3000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nuvita2-web
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - api

volumes:
  nuvita2_mongo_data:
  nuvita2_redis_data:
